# ============================================================================
# Kore Repuestos — Servicios locales de desarrollo
#
# La base de datos PostgreSQL ahora es externa (Supabase).
# Configura DATABASE_URL en apps/backend/.env con la cadena de conexión
# directa (puerto 5432) obtenida en:
#   Supabase Dashboard → Project Settings → Database → Connection string → URI
#
# Este archivo solo levanta herramientas auxiliares de desarrollo:
#   · pgadmin (perfil "tools") — interfaz gráfica que puede conectarse
#     tanto a Supabase como a cualquier Postgres local.
#
# Uso:
#   docker compose --profile tools up -d   # levanta pgAdmin en :5050
#   docker compose down                    # detiene
# ============================================================================

services:
  # Interfaz gráfica opcional para inspeccionar la BD de Supabase localmente.
  # Conectar desde pgAdmin usando los datos de:
  #   Supabase Dashboard → Project Settings → Database → Connection info
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kore-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@kore.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - kore_pgadmin_data:/var/lib/pgadmin
    networks:
      - kore-network
    profiles:
      - tools

volumes:
  kore_pgadmin_data:
    name: kore_pgadmin_data

networks:
  kore-network:
    name: kore-network
    driver: bridge
